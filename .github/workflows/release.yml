name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Cache NSIS and UPX
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: |
            C:\Program Files (x86)\NSIS
            C:\ProgramData\chocolatey\lib\upx
            C:\ProgramData\chocolatey\bin\upx.exe
          key: nsis-upx-v1

      - name: Install NSIS and UPX
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: choco install nsis upx -y

      - name: Install dependencies
        run: npm ci

      - name: Get version from package.json
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build client, app, and service
        run: |
          $clientJob = Start-Job { Set-Location $using:PWD; npm run build:client }
          $appJob = Start-Job { Set-Location $using:PWD; npm run build:app }
          $serviceJob = Start-Job { Set-Location $using:PWD; npm run build:service }
          $clientJob, $appJob, $serviceJob | Wait-Job | Receive-Job
          if ($clientJob.State -eq 'Failed' -or $appJob.State -eq 'Failed' -or $serviceJob.State -eq 'Failed') {
            throw "One or more build jobs failed"
          }

      - name: Smoke test binaries
        run: npm run build:verify

      - name: Build installer
        run: npm run build:package

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: DAEDALUS Terminal v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/DAEDALUS Setup.exe
