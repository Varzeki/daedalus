name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Job 1: Build Next.js client on fast Ubuntu runner ──
  build-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-linux-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --loglevel=error

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: src/client/.next/cache
          key: nextjs-${{ hashFiles('src/client/**/*.js', 'src/client/**/*.css') }}
          restore-keys: nextjs-

      - name: Build client
        run: npm run build:client

      - name: Upload client build
        uses: actions/upload-artifact@v4
        with:
          name: build-client
          path: build/client
          retention-days: 1

  # ── Job 2: Build app + service, assemble installer, create release ──
  release:
    needs: [build-client]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: src/app/go.sum

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-win-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --loglevel=error

      - name: Cache UPX and NSIS
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: |
            C:\Program Files (x86)\NSIS
            C:\ProgramData\chocolatey\lib\upx
            C:\ProgramData\chocolatey\bin\upx.exe
          key: nsis-upx-v1

      - name: Install NSIS and UPX
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: choco install nsis upx -y

      - name: Build app
        run: npm run build:app

      - name: Download client build
        uses: actions/download-artifact@v4
        with:
          name: build-client
          path: build/client

      - name: Cache pkg node binary
        uses: actions/cache@v4
        with:
          path: ~/.pkg-cache
          key: pkg-node24-win-x64-v1

      - name: Cache yt-dlp
        id: cache-ytdlp
        uses: actions/cache@v4
        with:
          path: resources/yt-dlp.exe
          key: yt-dlp-latest-${{ hashFiles('resources/yt-dlp.exe') }}
          restore-keys: yt-dlp-latest-

      - name: Download yt-dlp
        if: steps.cache-ytdlp.outputs.cache-hit != 'true'
        shell: bash
        run: |
          curl -L -o resources/yt-dlp.exe https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe
          ls -la resources/yt-dlp.exe

      - name: Cache ffmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: resources/ffmpeg.exe
          key: ffmpeg-${{ hashFiles('resources/ffmpeg-version.txt') }}

      - name: Download ffmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: bash
        run: |
          FFMPEG_VERSION=$(cat resources/ffmpeg-version.txt | tr -d '[:space:]')
          curl -L -o ffmpeg-release.7z "https://www.gyan.dev/ffmpeg/builds/packages/ffmpeg-${FFMPEG_VERSION}.7z"
          7z e ffmpeg-release.7z -oresources "*/bin/ffmpeg.exe" -r -y
          ls -la resources/ffmpeg.exe

      - name: Get version from package.json
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build service
        run: npm run build:service

      - name: Smoke test binaries
        run: npm run build:verify

      - name: Build installer
        run: npm run build:package

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: DAEDALUS Terminal v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/DAEDALUS Setup.exe
