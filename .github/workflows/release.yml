name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: src/app/go.sum

      - name: Cache NSIS and UPX
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: |
            C:\Program Files (x86)\NSIS
            C:\ProgramData\chocolatey\lib\upx
            C:\ProgramData\chocolatey\bin\upx.exe
          key: nsis-upx-v1

      - name: Install NSIS and UPX
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: choco install nsis upx -y

      - name: Cache node_modules
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Get version from package.json
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Download yt-dlp
        shell: bash
        run: |
          curl -L -o resources/yt-dlp.exe https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe
          ls -la resources/yt-dlp.exe

      - name: Build client
        run: npm run build:client

      - name: Build app
        run: npm run build:app

      - name: Build service
        run: npm run build:service

      - name: Smoke test binaries
        run: npm run build:verify

      - name: Build installer
        run: npm run build:package

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: DAEDALUS Terminal v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/DAEDALUS Setup.exe
