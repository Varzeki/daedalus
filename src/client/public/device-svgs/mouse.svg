<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="100%" height="100%" viewBox="0 0 360 115" version="1.1"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     style="fill-rule:evenodd;clip-rule:evenodd;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:1.41421;">

  <!-- Mouse silhouette: orange fill, evenodd reveals button split + wheel, 75% opacity -->
  <g transform="translate(0,8)">
    <path d="m50.004 0c-18.188 0-32.863 14.652-32.863 32.824v34.344c0 18.176 14.672 32.832 32.859 32.832s32.855-14.656 32.855-32.832l0.003906-34.344c0-18.172-14.668-32.824-32.855-32.824zm-0.8125 1.5742h0.027344v10.375c-2.6094 0.37891-4.6211 2.625-4.6211 5.3359v7.9297c0 2.7109 2.0117 4.9531 4.6211 5.3359v10.387l-30.516-0.003906v-8.1094c0-17.062 13.516-30.828 30.488-31.254zm1.5898 0c16.988 0.41016 30.512 14.18 30.512 31.254v8.1094h-30.512v-10.387c2.6094-0.37891 4.6172-2.625 4.6172-5.3359v-7.9297c0-2.7109-2.0078-4.957-4.6172-5.3359zm-0.77734 11.879c2.1406 0 3.8359 1.6914 3.8359 3.8281v7.9297c0 2.1367-1.6953 3.8281-3.8359 3.8281s-3.8398-1.6914-3.8398-3.8281v-7.9297c0-2.1367 1.7031-3.8281 3.8398-3.8281zm-31.301 29.043h62.59v24.672c0 17.336-13.941 31.27-31.289 31.27-17.352 0-31.297-13.934-31.297-31.27z"
          style="fill:rgb(250,150,0);stroke:rgb(250,150,0);stroke-width:0.5px;" opacity="0.75"/>
  </g>

  <!-- Pointer lines: waterfall cascade, non-crossing -->
  <!-- Line 1: left click area (upper-left button) to top box, nearly horizontal -->
  <path data-label="Mouse:Mouse_1" d="M35,21 L90,21" style="fill:none;stroke:rgb(250,150,0);stroke-width:0.8px;"/>
  <!-- Line 2: scroll wheel (centre top) to middle box -->
  <path data-labels="Mouse:Pos_Mouse_ZAxis Mouse:Neg_Mouse_ZAxis Mouse:Mouse_3" d="M50,28 L90,62" style="fill:none;stroke:rgb(250,150,0);stroke-width:0.8px;"/>
  <!-- Line 3: right-click button bottom edge to bottom box -->
  <path data-label="Mouse:Mouse_2" d="M56,43 L90,101" style="fill:none;stroke:rgb(250,150,0);stroke-width:0.8px;"/>

  <!-- Label box 1: Left Click (Mouse_1) -->
  <rect data-label="Mouse:Mouse_1" x="90" y="8" width="264" height="26" style="fill:none;stroke:rgb(250,150,0);stroke-width:1px;"/>

  <!-- Label box 2: Scroll wheel + click press (Pos_Mouse_ZAxis, Neg_Mouse_ZAxis, Mouse_3) -->
  <rect data-labels="Mouse:Pos_Mouse_ZAxis Mouse:Neg_Mouse_ZAxis Mouse:Mouse_3" x="90" y="40" width="264" height="44" style="fill:none;stroke:rgb(250,150,0);stroke-width:1px;"/>
  <!-- Row icons (left side of middle box) — wrapped to dim together with the shared box -->
  <g data-labels="Mouse:Pos_Mouse_ZAxis Mouse:Neg_Mouse_ZAxis Mouse:Mouse_3">
    <text x="94" y="52" style="fill:rgb(20,245,255);font-family:'LucidaGrande','Lucida Grande',sans-serif;font-weight:500;font-size:10px;">&#8593;</text>
    <text x="94" y="66" style="fill:rgb(20,245,255);font-family:'LucidaGrande','Lucida Grande',sans-serif;font-weight:500;font-size:10px;">&#8595;</text>
    <!-- Circle icon: wheel click / press -->
    <circle cx="97" cy="77" r="3.5" style="fill:none;stroke:rgb(250,150,0);stroke-width:1px;"/>
  </g>

  <!-- Label box 3: Right Click (Mouse_2) -->
  <rect data-label="Mouse:Mouse_2" x="90" y="90" width="264" height="22" style="fill:none;stroke:rgb(250,150,0);stroke-width:1px;"/>

</svg>
