<svg xmlns="http://www.w3.org/2000/svg" width="150" height="57" viewBox="0 0 150 57">
  <defs>
    <linearGradient id="headerBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140500"/>
      <stop offset="100%" stop-color="#060100"/>
    </linearGradient>
    <filter id="whiteGlow" x="-30%" y="-50%" width="160%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.1" flood-color="#ffffff" flood-opacity="0.34"/>
    </filter>
    <filter id="orangeGlow" x="-30%" y="-50%" width="160%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.8" flood-color="#fa9600" flood-opacity="0.72"/>
      <feDropShadow dx="0" dy="0" stdDeviation="0.7" flood-color="#ffd39a" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="150" height="57" fill="url(#headerBg)"/>
  <text x="10" y="24"
    fill="#ffffff"
    filter="url(#whiteGlow)"
    font-family="Euro Caps, Eurostile, sans-serif"
    font-size="26"
    font-kerning="none"
    font-variant-ligatures="none"
    style="font-feature-settings:'kern' 0,'liga' 0,'clig' 0"
    letter-spacing="0.25">DAEDALUS</text>
  <text x="12" y="45"
    fill="#fa9600"
    filter="url(#orangeGlow)"
    font-family="Euro Caps, Eurostile, sans-serif"
    font-size="18"
    font-kerning="none"
    font-variant-ligatures="none"
    style="font-feature-settings:'kern' 0,'liga' 0,'clig' 0"
    letter-spacing="0.2">TERMINAL</text>
</svg>